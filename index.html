<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sportbox">

<title>Sportbox Pilates</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f0ee;min-height:100vh;-webkit-text-size-adjust:100%}
.app-wrapper{max-width:700px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.top-bar{background:#fff;border-bottom:1.5px solid #e0d8f0;padding:8px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.logo-small{height:72px;width:auto}
.nav-btns{display:flex;gap:6px;margin-left:auto}
.nav-btn{padding:7px 16px;border:1.5px solid #ccc;border-radius:8px;background:#fff;color:#888;font-size:13px;cursor:pointer;font-weight:500}
.nav-btn.active{background:#7c6fa0;color:#fff;border-color:#7c6fa0}
.content{flex:1;padding:1rem}
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.date-nav-btn{padding:5px 14px;border:1.5px solid #ccc;border-radius:8px;background:#fff;color:#333;font-size:16px;cursor:pointer;font-weight:500}
.date-nav-btn:hover:not(:disabled){background:#f0f0ed;border-color:#7c6fa0;color:#7c6fa0}
.date-nav-btn:disabled{opacity:0.25;cursor:default}
.teacher-date{flex:1;text-align:center;font-size:14px;color:#555;font-weight:500;text-transform:capitalize}
.class-block{border-radius:12px;margin-bottom:1.2rem;overflow:hidden;border:2px solid #e0d8f0}
.current-block{border-color:#7c6fa0;box-shadow:0 2px 12px rgba(124,111,160,0.15)}
.next-block{border-color:#e0e0e0;opacity:0.9}
.class-block-header{background:#7c6fa0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.next-block .class-block-header{background:#9e9e9e}
.class-time-big{font-size:20px;font-weight:700;color:#fff}
.class-count{font-size:13px;color:rgba(255,255,255,0.85);font-weight:500}
.next-class-label{font-size:11px;font-weight:700;color:#9e9e9e;text-transform:uppercase;letter-spacing:0.8px;margin:0.5rem 0 0.3rem;padding-left:2px}
.prev-note{background:#f5f5f2;border-left:3px solid #ccc;padding:7px 12px;font-size:12px;color:#888;margin:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:0 6px 6px 0}
.prev-note.has-note{background:#fff3e0;border-color:#fb8c00;color:#5d4037}
.prev-note-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.prev-note-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prev-note.expanded .prev-note-text{white-space:normal}
.attendance-hint{font-size:11px;color:#7c6fa0;padding:5px 12px;background:#f3e5f5;font-style:italic;text-align:center}
.students-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
.student-card{background:var(--plan-bg,#f5f5f2);border:1.5px solid var(--plan-border,#ccc);border-radius:10px;padding:10px 12px;cursor:pointer;transition:opacity 0.15s;position:relative;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.student-card:active{opacity:0.7}
.student-card.absent{opacity:0.45;background:#f5f5f5 !important;border-color:#bbb !important}
.next-card{cursor:default}
.next-card:active{opacity:1}
.student-name-card{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px;line-height:1.2}
.plan-badge{font-size:10px;font-weight:700;border-radius:99px;padding:2px 7px;display:inline-block}
.trial-badge{font-size:10px;color:#e65100;font-weight:700;margin-top:2px}
.absent-mark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.55);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;pointer-events:none;white-space:nowrap}
.note-section{padding:10px 12px;border-top:1px solid #eee;display:flex;gap:8px;align-items:center}
.note-input{flex:1;padding:8px 10px;border:1.5px solid #ccc;border-radius:8px;font-size:13px;outline:none}
.note-input:focus{border-color:#7c6fa0}
.note-save-btn{padding:7px 12px;border:none;border-radius:8px;background:#7c6fa0;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:500}
.empty-class{padding:1rem;text-align:center;color:#aaa;font-size:13px}
.no-class-msg{padding:2rem;text-align:center;color:#aaa;font-size:14px;border:1.5px dashed #ddd;border-radius:10px}
.admin-tabs{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid #ccc;border-radius:10px;overflow:hidden;margin-bottom:1.2rem}
.admin-tab{padding:9px 4px;font-size:11px;border:none;background:#f0f0ed;color:#888;cursor:pointer;text-align:center;font-weight:500;border-right:1px solid #ddd;border-bottom:1px solid #ddd}
.admin-tab.active{background:#7c6fa0;color:#fff}
.sync-info{background:#f5f5f2;border-radius:10px;padding:16px;margin-bottom:1rem;text-align:center}
.sync-num{font-size:36px;font-weight:700;color:#7c6fa0;display:block}
.sync-label{font-size:13px;color:#888;margin-top:4px;display:block}
.plan-breakdown{background:#fff;border:1.5px solid #eee;border-radius:10px;padding:12px;margin-bottom:1rem}
.plan-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#444}
.plan-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sync-btn{width:100%;padding:11px;border:none;border-radius:10px;background:#4a4560;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
.sync-btn:hover{background:#5c5678}
.sync-success{background:#edf7ed;border:1.5px solid #b8ddb9;border-radius:8px;padding:10px 14px;font-size:13px;color:#2d7a3a;font-weight:500}
.sync-error{background:#fdf0ee;border:1.5px solid #f5c6c6;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#f5f5f2;border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:#4a4560}
.stat-label{font-size:11px;color:#888;margin-top:4px}
.stat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.stat-bar-label{font-size:12px;color:#555;min-width:110px;font-weight:500}
.stat-bar-wrap{flex:1;background:#eee;border-radius:99px;height:8px;overflow:hidden}
.stat-bar{height:100%;border-radius:99px}
.stat-bar-count{font-size:12px;color:#555;font-weight:600;min-width:24px;text-align:right}
.ranking-row{display:flex;align-items:center;gap:10px;background:#fafaf8;border:1.5px solid #ddd;border-radius:10px;padding:10px 14px;margin-bottom:6px}
.ranking-pos{font-size:16px;min-width:28px}
.ranking-name{flex:1;font-size:13px;font-weight:600;color:#1a1a1a}
.plan-badge-small{font-size:10px;font-weight:700;border-radius:99px;padding:2px 7px}
.ranking-abs{font-size:12px;color:#888}
.log-date-header{font-size:11px;font-weight:700;color:#7c6fa0;text-transform:uppercase;letter-spacing:0.6px;margin:12px 0 6px}
.log-row{display:flex;align-items:center;gap:12px;background:#fafaf8;border:1.5px solid #eee;border-radius:8px;padding:8px 12px;margin-bottom:4px}
.log-time{font-size:13px;font-weight:600;color:#4a4560;min-width:60px}
.log-name{font-size:13px;color:#333}
.section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.loading{padding:2rem;text-align:center;color:#aaa;font-size:14px}
.no-classes{padding:2rem;text-align:center;color:#aaa;font-size:14px;border:1.5px dashed #ddd;border-radius:10px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:420px;max-height:80vh;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);display:flex;flex-direction:column}
.modal-header{padding:14px 16px;border-bottom:1.5px solid #eee;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600;color:#1a1a1a}
.modal-close-btn{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1;padding:0}
.modal-body{padding:1rem;overflow-y:auto}
.admin-login-box{padding:1.5rem}
.admin-login-box h2{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:1rem}
.admin-login-box input{width:100%;padding:10px 13px;border:1.5px solid #ccc;border-radius:10px;font-size:14px;outline:none;margin-bottom:8px}
.admin-login-box input:focus{border-color:#7c6fa0}
.admin-login-box button{width:100%;padding:10px;border:none;border-radius:10px;background:#4a4560;color:#fff;font-size:14px;cursor:pointer;font-weight:500}
.error-msg{font-size:12px;color:#c0392b;margin-bottom:8px;font-weight:500}
.history-stat-row{display:flex;gap:10px;margin-bottom:1rem}
.history-stat{flex:1;background:#f5f5f2;border-radius:8px;padding:10px;text-align:center}
.history-stat-num{font-size:22px;font-weight:700;color:#4a4560}
.history-stat-label{font-size:11px;color:#888;margin-top:2px}
.history-entry{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0ee;font-size:13px}
.history-entry:last-child{border-bottom:none}
.history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.history-dot.absent{background:#c0392b}
.history-entry-date{color:#666;min-width:90px}
.history-entry-time{color:#999;font-size:12px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#4a4560;color:#fff;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:480px){.students-grid{grid-template-columns:repeat(2,1fr)}.stats-grid{grid-template-columns:repeat(2,1fr)}.content{padding:0.8rem}}
</style>
</head>

async function sb(path,opts){
  opts=opts||{};
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    method:opts.method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||''},
    body:opts.body||undefined
  });
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

function todayStr(){
  const d=new Date();d.setDate(d.getDate()+dateOffset);
  return d.toISOString().split('T')[0];
}
function getOffsetDate(){

}
function nowHour(){return new Date().getHours();}
function todayDow(){
  const d=new Date();d.setDate(d.getDate()+dateOffset);return d.getDay();

function fdDate(d){

function getPlanColor(plan,isTrial){
  if(isTrial)return{bg:'#fff9c4',border:'#f9a825',text:'#5d4037',label:'PRUEBA'};
  if(plan===1)return{bg:'#e3f2fd',border:'#1976d2',text:'#0d47a1',label:'Plan 1x'};
  if(plan===2)return{bg:'#e8f5e9',border:'#388e3c',text:'#1b5e20',label:'Plan 2x'};
  if(plan===3)return{bg:'#f3e5f5',border:'#7b1fa2',text:'#4a148c',label:'Plan 3x'};
  return{bg:'#f5f5f5',border:'#9e9e9e',text:'#424242',label:'?'};
}

function getStudentsForClass(dayName,timeStr){
  return Object.values(students).filter(s=>{
    if(!s.schedule)return false;
    return s.schedule.some(slot=>slot===dayName+'_'+timeStr);
  }).sort((a,b)=>a.name.localeCompare(b.name));
}

async function loadStudents(){
  try{
    const rows=await sb('students_v2?select=*');
    students={};
    (rows||[]).forEach(s=>{students[s.name]=s;});
  }catch(e){console.log('loadStudents error:',e.message);students={};}
}

async function autoSync(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),10000);
    const resp=await fetch(APPS_SCRIPT_URL,{signal:controller.signal});
    clearTimeout(timeout);
    if(!resp.ok)return;
    const data=await resp.json();
    const parsed=parseSheet(data.values||[],data.backgrounds||[]);
    if(Object.keys(parsed).length>0){
      await saveStudentsToSupabase(parsed);
      await loadStudents();
    }
  }catch(e){console.log('Auto-sync error:',e.message);}
}

function isYellow(color){
  if(!color)return false;
  return color.toLowerCase()==='#ffff00';
}

function parseSheet(rows,backgrounds){
  backgrounds=backgrounds||[];
  let headerRowIdx=-1;
  let dayColMap={};
  for(let i=0;i<rows.length;i++){
    const row=rows[i]||[];
    for(let j=0;j<row.length;j++){
      if((row[j]||'').toString().trim().toUpperCase()==='LUNES'){
        headerRowIdx=i;
        row.forEach((c,idx)=>{
          const d=(c||'').toString().trim().toUpperCase();
          if(DAYS_SHEET.includes(d))dayColMap[d]=idx;
        });
        break;
      }
    }
    if(headerRowIdx>=0)break;
  }
  if(headerRowIdx<0)return{};

  const result={};
  let currentTime=null;
  let rowsInSlot=0;
  const ROWS_PER_SLOT=6;

  for(let i=headerRowIdx+1;i<rows.length;i++){
    const row=rows[i]||[];
    let foundTime=false;
    for(let j=0;j<3;j++){
      const m=(row[j]||'').toString().trim().toUpperCase().match(/^(\d+)\s*HS/i);
      if(m){currentTime=m[1];rowsInSlot=0;foundTime=true;break;}
    }
    if(!foundTime)rowsInSlot++;
    if(rowsInSlot>ROWS_PER_SLOT)currentTime=null;
    if(!currentTime)continue;

    Object.entries(dayColMap).forEach(([day,colIdx])=>{
      const val=(row[colIdx]||'').toString().trim();
      if(!val||val==='0')return;
      const name=val.toUpperCase().trim();
      if(name.length<2||DAYS_SHEET.includes(name)||name==='TURNO'||name.includes('CLIENTE'))return;
      const bg=(backgrounds[i]&&backgrounds[i][colIdx])||'';
      const trial=isYellow(bg);
      if(!result[name])result[name]={name,schedule:[],is_trial:false};
      if(trial)result[name].is_trial=true;
      const slot=day+'_'+currentTime;
      if(!result[name].schedule.includes(slot))result[name].schedule.push(slot);
    });
  }

  Object.values(result).forEach(s=>{
    s.plan=s.schedule.length>=3?3:s.schedule.length===2?2:1;
  });
  return result;
}

async function saveStudentsToSupabase(parsed){
  const upserts=Object.values(parsed).map(s=>({
    name:s.name,plan:s.plan,is_trial:s.is_trial,
    schedule:s.schedule,updated_at:new Date().toISOString()
  }));
  if(!upserts.length)return;
  for(let i=0;i<upserts.length;i+=50){
    const batch=upserts.slice(i,i+50);
    await sb('students_v2',{method:'POST',prefer:'resolution=merge-duplicates,return=minimal',body:JSON.stringify(batch)});
  }
}

async function renderTeacherView(){
  const container=document.getElementById('teacher-view');
  await loadStudents();
  const today=todayStr();
  const todayLabel=fdDate(getOffsetDate());
  const isToday=dateOffset===0;
  const dow=todayDow();

  let html='<div class="date-nav">';
  html+='<button class="date-nav-btn" onclick="changeDate(-1)"'+(isToday?' disabled':'')+'>&#8249;</button>';
  html+='<div class="teacher-date">'+(isToday?'Hoy &mdash; ':'')+todayLabel+'</div>';
  html+='<button class="date-nav-btn" onclick="changeDate(1)">&#8250;</button>';
  html+='</div>';

  if(dow===0){
    html+='<div class="no-class-msg">No hay clases los domingos.</div>';
    container.innerHTML=html;return;
  }

  const dayName=DAYS_SHEET[dow-1];
  const hour=nowHour();
  const allTimes=TIMES.map(Number).sort((a,b)=>a-b);
  let shown=0;

  if(isToday){
    // Show current class if happening now
    const currentTime=allTimes.find(t=>t===hour);
    if(currentTime!==undefined){
      const cls=getStudentsForClass(dayName,String(currentTime));
      if(cls.length>0){
        html+=await renderClassBlock(dayName,String(currentTime),today,'current');
        shown++;
      }
    }
    // Fill up to 2 shown with future classes
    const needed=shown>0?1:2;
    let added=0;
    for(const t of allTimes.filter(t=>t>hour)){
      if(added>=needed)break;
      const cls=getStudentsForClass(dayName,String(t));
      if(cls.length>0){
        html+='<div class="next-class-label">'+(shown===0&&added===0?'Próxima clase':added===0?'Próxima clase':'Le sigue')+'</div>';
        html+=await renderClassBlock(dayName,String(t),today,'next');
        added++;shown++;
      }
    }
  }else{
    // Future day - show first 2 classes with students
    let added=0;
    for(const t of allTimes){
      if(added>=2)break;
      const cls=getStudentsForClass(dayName,String(t));
      if(cls.length>0){
        html+='<div class="next-class-label">'+(added===0?'Próxima clase':'Le sigue')+'</div>';
        html+=await renderClassBlock(dayName,String(t),today,'next');
        added++;shown++;
      }
    }
  }

  if(shown===0){
    html+='<div class="no-class-msg">No hay más clases para hoy.</div>';
  }

  container.innerHTML=html;
  attachAttendanceHandlers();
  attachNoteHandlers();
}

async function renderClassBlock(dayName,timeStr,today,type){
  const classStudents=getStudentsForClass(dayName,timeStr);
  const dayNum=todayDow();
  const [attendance,noteRows]=await Promise.all([
    sb('attendance?class_date=eq.'+today+'&class_time=eq.'+timeStr+'&select=*').catch(()=>[]),
    sb('class_notes?class_time=eq.'+timeStr+'&class_day=eq.'+dayNum+'&select=*').catch(()=>[])
  ]);
  const absentSet=new Set((attendance||[]).filter(a=>!a.present).map(a=>a.student_name));
  const noteText=noteRows&&noteRows.length?noteRows[0].note:'';

  let html='<div class="class-block '+(type==='current'?'current-block':'next-block')+'" data-time="'+timeStr+'" data-day="'+dayName+'">';
  html+='<div class="class-block-header">';
  html+='<div class="class-time-big">'+timeStr+':00 hs</div>';
  html+='<div class="class-count">'+classStudents.length+' alumnos</div>';
  html+='</div>';

  // Note display
  html+='<div class="prev-note'+(noteText?' has-note':'')+'" onclick="this.classList.toggle('expanded')">';
  html+='<span class="prev-note-label">&#128204; Nota:</span>';
  html+='<span class="prev-note-text">'+(noteText||'<span style="color:#ccc;font-style:italic">Sin nota</span>')+'</span>';
  html+='</div>';

  if(type==='current'){
    html+='<div class="attendance-hint">Tap = ausente &nbsp;|&nbsp; Hold = historial</div>';
  }

  if(classStudents.length===0){
    html+='<div class="empty-class">Sin alumnos registrados.</div>';
  }else{
    html+='<div class="students-grid">';
    classStudents.forEach(s=>{
      const c=getPlanColor(s.plan,s.is_trial);
      const isAbsent=absentSet.has(s.name);
      html+='<div class="student-card'+(isAbsent?' absent':'')+(type==='next'?' next-card':'')+'"';
      html+=' data-name="'+s.name+'" data-time="'+timeStr+'"';
      html+=' style="--plan-bg:'+c.bg+';--plan-border:'+c.border+';--plan-text:'+c.text+'">';
      html+='<div class="student-name-card">'+s.name+'</div>';
      html+='<div class="plan-badge" style="background:'+c.bg+';color:'+c.text+';border:1px solid '+c.border+'">'+c.label+'</div>';
      if(s.is_trial)html+='<div class="trial-badge">&#9733; PRUEBA</div>';
      if(isAbsent)html+='<div class="absent-mark">AUSENTE</div>';
      html+='</div>';
    });
    html+='</div>';
  }

  if(type==='current'){
    html+='<div class="note-section">';
    html+='<input type="text" class="note-input" id="note-'+timeStr+'" placeholder="Nota para próxima clase..." value="'+noteText+'">';
    html+='<button class="note-save-btn" data-time="'+timeStr+'" data-day="'+dayNum+'">Guardar</button>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function attachNoteHandlers(){
  document.querySelectorAll('.note-save-btn').forEach(btn=>{
    btn.onclick=function(){
      const time=this.getAttribute('data-time');
      const day=parseInt(this.getAttribute('data-day'));
      saveNote(time,day);
    };
  });
}

function attachAttendanceHandlers(){
  document.querySelectorAll('.student-card:not(.next-card)').forEach(card=>{
    let holdTimer=null;
    let holding=false;
    card.addEventListener('mousedown',()=>{
      holding=false;
      holdTimer=setTimeout(()=>{holding=true;showStudentHistory(card.getAttribute('data-name'));},600);
    });
    card.addEventListener('touchstart',()=>{
      holding=false;
      holdTimer=setTimeout(()=>{holding=true;showStudentHistory(card.getAttribute('data-name'));},600);
    },{passive:true});
    const cancel=()=>clearTimeout(holdTimer);
    card.addEventListener('mouseup',cancel);
    card.addEventListener('touchend',cancel);
    card.addEventListener('mouseleave',cancel);
    card.addEventListener('click',async function(){
      if(holding)return;
      const name=this.getAttribute('data-name');
      const time=this.getAttribute('data-time');
      const today=todayStr();
      const isAbsent=this.classList.contains('absent');
      try{
        if(isAbsent){
          await sb('attendance?class_date=eq.'+today+'&class_time=eq.'+time+'&student_name=eq.'+encodeURIComponent(name),{method:'DELETE',prefer:'return=minimal'});
          this.classList.remove('absent');
          this.querySelector('.absent-mark')&&this.querySelector('.absent-mark').remove();
        }else{
          await sb('attendance',{method:'POST',prefer:'return=minimal',body:JSON.stringify({class_date:today,class_time:time,student_name:name,present:false})});
          this.classList.add('absent');
          if(!this.querySelector('.absent-mark')){
            const m=document.createElement('div');
            m.className='absent-mark';m.textContent='AUSENTE';
            this.appendChild(m);
          }
        }
      }catch(e){showToast('Error al registrar.');}
    });
  });
}

async function showStudentHistory(name){
  const rows=await sb('attendance?student_name=eq.'+encodeURIComponent(name)+'&present=eq.false&select=*&order=class_date.desc&limit=30').catch(()=>[]);
  const s=students[name]||{};
  const c=getPlanColor(s.plan,s.is_trial);
  let html='<div class="history-stat-row">';
  html+='<div class="history-stat"><div class="history-stat-num">'+(rows||[]).length+'</div><div class="history-stat-label">Ausencias</div></div>';
  html+='<div class="history-stat"><div class="history-stat-num" style="font-size:14px;padding-top:4px;color:'+c.text+'">'+c.label+'</div><div class="history-stat-label">Plan</div></div>';
  html+='</div>';
  if(!rows||!rows.length){
    html+='<div style="text-align:center;color:#aaa;padding:1rem;font-size:13px">Sin ausencias registradas &#10003;</div>';
  }else{
    rows.forEach(r=>{
      const d=new Date(r.class_date+'T12:00:00');
      const dateStr=d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
      html+='<div class="history-entry"><div class="history-dot absent"></div><div class="history-entry-date">'+dateStr+'</div><div class="history-entry-time">'+r.class_time+':00 hs</div></div>';
    });
  }
  document.getElementById('history-modal-name').textContent=name;
  document.getElementById('history-modal-body').innerHTML=html;
  document.getElementById('history-modal').classList.add('show');
}

function closeHistoryModal(){document.getElementById('history-modal').classList.remove('show');}

async function saveNote(timeStr,dayNum){
  const input=document.getElementById('note-'+timeStr);
  const note=input.value.trim();
  try{
    const existing=await sb('class_notes?class_time=eq.'+timeStr+'&class_day=eq.'+dayNum+'&select=id');
    if(existing&&existing.length>0){
      await sb('class_notes?class_time=eq.'+timeStr+'&class_day=eq.'+dayNum,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({note})});
    }else{
      await sb('class_notes',{method:'POST',prefer:'return=minimal',body:JSON.stringify({class_time:timeStr,class_day:dayNum,note})});
    }
    showToast('Nota guardada.');
  }catch(e){showToast('Error al guardar nota.');}
}

  if(tab==='stats')renderStats();
  if(tab==='ranking')renderRanking();
  if(tab==='log')renderAttendanceLog();
}

async function renderSyncPanel(){
  const count=Object.keys(students).length;
  const plans={1:0,2:0,3:0,trial:0};
  Object.values(students).forEach(s=>{if(s.is_trial)plans.trial++;else plans[s.plan]=(plans[s.plan]||0)+1;});
  let html='<div class="sync-info"><span class="sync-num">'+count+'</span><span class="sync-label">Alumnos en sistema</span></div>';
  html+='<div class="plan-breakdown">';
  html+='<div class="plan-row"><span class="plan-dot" style="background:#1976d2"></span>Plan 1x semana: <strong>'+plans[1]+'</strong></div>';
  html+='<div class="plan-row"><span class="plan-dot" style="background:#388e3c"></span>Plan 2x semana: <strong>'+plans[2]+'</strong></div>';
  html+='<div class="plan-row"><span class="plan-dot" style="background:#7b1fa2"></span>Plan 3x semana: <strong>'+plans[3]+'</strong></div>';
  html+='<div class="plan-row"><span class="plan-dot" style="background:#f9a825"></span>Clase de prueba: <strong>'+plans.trial+'</strong></div>';
  html+='</div>';
  html+='<button class="sync-btn" onclick="doSync()">&#8635; Sincronizar con Google Sheets</button>';
  html+='<div id="sync-result"></div>';
  document.getElementById('adm-panel-sync').innerHTML=html;
}

async function doSync(){
  const res=document.getElementById('sync-result');
  res.innerHTML='<div class="loading">Leyendo Google Sheets...</div>';
  try{
    const resp=await fetch(APPS_SCRIPT_URL);
    if(!resp.ok)throw new Error('Error '+resp.status);
    const data=await resp.json();
    const parsed=parseSheet(data.values||[],data.backgrounds||[]);
    await saveStudentsToSupabase(parsed);
    await loadStudents();
    renderSyncPanel();
    res.innerHTML='<div class="sync-success">&#10003; '+Object.keys(parsed).length+' alumnos sincronizados.</div>';
  }catch(e){res.innerHTML='<div class="sync-error">Error: '+e.message+'</div>';}
}

async function renderStats(){
  const today=todayStr();
  const rows=await sb('attendance?present=eq.false&class_date=lte.'+today+'&select=*&limit=1000').catch(()=>[]);
  const absentCount=(rows||[]).length;
  const plans={1:0,2:0,3:0,trial:0};
  Object.values(students).forEach(s=>{if(s.is_trial)plans.trial++;else plans[s.plan]=(plans[s.plan]||0)+1;});
  const total=Object.keys(students).length||1;
  let html='<div class="stats-grid">';
  html+='<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Alumnos</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+absentCount+'</div><div class="stat-label">Ausencias registradas</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+plans.trial+'</div><div class="stat-label">Clases de prueba</div></div>';
  html+='</div>';
  html+='<div class="section-title" style="margin-top:1rem">Por plan</div>';
  [{label:'Plan 1x',count:plans[1],color:'#1976d2'},{label:'Plan 2x',count:plans[2],color:'#388e3c'},{label:'Plan 3x',count:plans[3],color:'#7b1fa2'}].forEach(p=>{
    const pct=Math.round((p.count/total)*100);
    html+='<div class="stat-bar-row"><span class="stat-bar-label">'+p.label+'</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:'+pct+'%;background:'+p.color+'"></div></div><span class="stat-bar-count">'+p.count+'</span></div>';
  });
  document.getElementById('adm-panel-stats').innerHTML=html;
}

async function renderRanking(){
  const rows=await sb('attendance?present=eq.false&select=student_name').catch(()=>[]);
  const counts={};
  (rows||[]).forEach(r=>{counts[r.student_name]=(counts[r.student_name]||0)+1;});
  const ranked=Object.keys(students).map(n=>({name:n,abs:counts[n]||0})).sort((a,b)=>a.abs-b.abs);
  let html='<div class="section-title">Menos ausencias</div>';
  ranked.slice(0,20).forEach((s,i)=>{
    const medal=i===0?'&#129351;':i===1?'&#129352;':i===2?'&#129353;':'';
    const c=getPlanColor(students[s.name]?.plan,students[s.name]?.is_trial);
    html+='<div class="ranking-row"><span class="ranking-pos">'+(medal||'#'+(i+1))+'</span><span class="ranking-name">'+s.name+'</span><span class="plan-badge-small" style="background:'+c.bg+';color:'+c.text+';border:1px solid '+c.border+'">'+c.label+'</span><span class="ranking-abs">'+s.abs+' aus.</span></div>';
  });
  document.getElementById('adm-panel-ranking').innerHTML=html;
}

async function renderAttendanceLog(){
  const rows=await sb('attendance?present=eq.false&select=*&order=class_date.desc&limit=100').catch(()=>[]);
  if(!rows||!rows.length){document.getElementById('adm-panel-log').innerHTML='<div class="no-classes">Sin ausencias registradas.</div>';return;}
  let html='',lastDate='';
  rows.forEach(r=>{
    if(r.class_date!==lastDate){
      const d=new Date(r.class_date+'T12:00:00');
      html+='<div class="log-date-header">'+d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})+'</div>';
      lastDate=r.class_date;
    }
    html+='<div class="log-row"><span class="log-time">'+r.class_time+':00 hs</span><span class="log-name">'+r.student_name+'</span></div>';
  });
  document.getElementById('adm-panel-log').innerHTML=html;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('btn-teacher').addEventListener('click',()=>showView('teacher'));
document.getElementById('btn-admin').addEventListener('click',()=>{
  if(!adminLoggedIn)showAdminLogin();
  else showView('admin');
});
document.getElementById('admin-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
