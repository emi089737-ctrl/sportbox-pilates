  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}

function getPlanColor(plan,isTrial){
  if(isTrial)return{bg:'#fff9c4',border:'#f9a825',text:'#5d4037',label:'PRUEBA'};
  if(plan===1)return{bg:'#e3f2fd',border:'#1976d2',text:'#0d47a1',label:'Plan 1x'};
  if(plan===2)return{bg:'#e8f5e9',border:'#388e3c',text:'#1b5e20',label:'Plan 2x'};
  if(plan===3)return{bg:'#f3e5f5',border:'#7b1fa2',text:'#4a148c',label:'Plan 3x'};
  return{bg:'#f5f5f5',border:'#9e9e9e',text:'#424242',label:'?'};
}

function getCurrentAndNextClass(){
  const hour=nowHour();
  const dow=todayDow();
  if(dow===0)return{current:null,next:null};
  const dayName=DAYS_SHEET[dow-1];
  const allTimes=TIMES.map(Number).sort((a,b)=>a-b);
  let current=null,next=null;
  for(let i=0;i<allTimes.length;i++){
    const t=allTimes[i];
    const tNext=allTimes[i+1]||25;
    if(hour>=t&&hour<tNext){current=t;next=allTimes[i+1]||null;break;}
    if(hour<t){next=t;break;}
  }
  // If before first class
  if(!current&&!next&&hour<allTimes[0])next=allTimes[0];
  return{current,next,dayName,dow};
}

function getStudentsForClass(dayName,timeStr){
  const key=dayName+'_'+timeStr;
  return Object.values(students).filter(s=>{
    if(!s.schedule)return false;
    return s.schedule.some(slot=>slot===key);
  }).sort((a,b)=>a.name.localeCompare(b.name));
}

async function loadStudents(){
  try{
    const rows=await sb('students_v2?select=*');
    students={};
    (rows||[]).forEach(s=>{students[s.name]=s;});
  }catch(e){console.log('loadStudents error:',e.message);students={};}
}

async function renderTeacherView(){
  const container=document.getElementById('teacher-view');
  await loadStudents();
  const {current,next,dayName,dow}=getCurrentAndNextClass();
  const today=todayStr();
  const todayLabel=fdDate(getOffsetDate());
  const isToday=dateOffset===0;
  let html='<div class="teacher-header">';
  html+='<div class="date-nav">';
  html+='<button class="date-nav-btn" onclick="changeDate(-1)" '+(isToday?'disabled':'')+'>&#8249;</button>';
  html+='<div class="teacher-date">'+(isToday?'Hoy &mdash; ':'')+todayLabel+'</div>';
  html+='<button class="date-nav-btn" onclick="changeDate(1)">&#8250;</button>';
  html+='</div></div>';

  const hour=nowHour();
  const dow2=todayDow();
  if(dow2===0){html+='<div class="no-class-msg">No hay clases los domingos.</div>';container.innerHTML=html;return;}
  const dayName2=dateOffset>0?DAYS_SHEET[dow2-1]:dayName;
  const allTimesNum=TIMES.map(Number).sort((a,b)=>a-b);

  // Classify times: current (happening now), upcoming (future with students)
  let shown=0;

  if(dateOffset===0){
    // Current class if happening now
    if(current){
      const cls=getStudentsForClass(dayName2,String(current));
      if(cls.length>0){
        html+=await renderClassBlock(dayName2,String(current),today,'current');
        shown++;
      }
    }
    // Next upcoming classes
    const futureTimes=allTimesNum.filter(t=>t>hour);
    const needed=shown>0?1:2;
    let added=0;
    for(const t of futureTimes){
      if(added>=needed)break;
      const cls=getStudentsForClass(dayName2,String(t));
      if(cls.length>0){
        const lbl=added===0?'Pr\u00f3xima clase':'Le sigue';
        html+='<div class="next-class-label">'+lbl+'</div>';
        html+=await renderClassBlock(dayName2,String(t),today,'next');
        added++;shown++;
      }
    }
  }else{
    // Future day - show first two classes with students
    let added=0;
    for(const t of allTimesNum){
      if(added>=2)break;
      const cls=getStudentsForClass(dayName2,String(t));
      if(cls.length>0){
        const lbl=added===0?'Pr\u00f3xima clase':'Le sigue';
        html+='<div class="next-class-label">'+lbl+'</div>';
        html+=await renderClassBlock(dayName2,String(t),today,'next');
        added++;shown++;
      }
    }
  }

  if(shown===0){
    html+='<div class="no-class-msg">No hay m\u00e1s clases programadas para hoy.</div>';
  }

  container.innerHTML=html;
  attachAttendanceHandlers();
}

async function renderClassBlock(dayName,timeStr,today,type){
  const classStudents=getStudentsForClass(dayName,timeStr);
  const dayNum=todayDow();

  // Fetch attendance and note in parallel
  const [attendance,noteRows]=await Promise.all([
    sb('attendance?class_date=eq.'+today+'&class_time=eq.'+timeStr+'&select=*').catch(()=>[]),
    sb('class_notes?class_time=eq.'+timeStr+'&class_day=eq.'+dayNum+'&select=*').catch(()=>[])
  ]);

  const absentSet=new Set((attendance||[]).filter(a=>!a.present).map(a=>a.student_name));
  const noteText=noteRows&&noteRows.length?noteRows[0].note:'';

  let html='<div class="class-block '+(type==='current'?'current-block':'next-block')+'" data-time="'+timeStr+'" data-day="'+dayName+'">';
  html+='<div class="class-block-header">';
  html+='<div class="class-time-big">'+timeStr+':00 hs</div>';
  html+='<div class="class-count">'+classStudents.length+' alumnos</div>';
  html+='</div>';

  // Note display
  if(noteText){
    html+='<div class="prev-note has-note" onclick="this.classList.toggle(\'expanded\')">';
    html+='<span class="prev-note-label">&#128204; Nota:</span>';
    html+='<span class="prev-note-text">'+noteText+'</span>';
    html+='<span class="prev-note-expand">&#8964;</span>';
    html+='</div>';
  }

  if(type==='current'){
    html+='<div class="attendance-hint">Tap = ausente &nbsp;|&nbsp; Hold = historial</div>';
  }

  if(classStudents.length===0){
    html+='<div class="empty-class">Sin alumnos registrados en este horario.</div>';
  }else{
    html+='<div class="students-grid">';
    classStudents.forEach(s=>{
      const colors=getPlanColor(s.plan,s.is_trial);
      const isAbsent=absentSet.has(s.name);
      html+='<div class="student-card '+(isAbsent?'absent':'')+(type==='next'?' next-card':'')+'" ';
      html+='data-name="'+s.name+'" data-time="'+timeStr+'" ';
      html+='style="--plan-bg:'+colors.bg+';--plan-border:'+colors.border+';--plan-text:'+colors.text+'">';
      html+='<div class="student-name-card">'+s.name+'</div>';
      html+='<div class="plan-badge" style="background:'+colors.bg+';color:'+colors.text+';border:1px solid '+colors.border+'">'+colors.label+'</div>';
      if(s.is_trial)html+='<div class="trial-badge">&#9733; PRUEBA</div>';
      if(isAbsent)html+='<div class="absent-mark">AUSENTE</div>';
      html+='</div>';
    });
    html+='</div>';
  }

  if(type==='current'){
    html+='<div class="note-section">';
    html+='<input type="text" class="note-input" id="note-'+timeStr+'" placeholder="Nota para pr\u00f3xima clase..." value="'+noteText+'" />';
    html+='<button class="note-save-btn" onclick="saveNote(\''+timeStr+'\','+dayNum+')">Guardar</button>';
    html+='</div>';
  }

  html+='</div>';
  return html;
}
